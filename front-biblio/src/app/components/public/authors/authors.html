<div class="container py-4">
  <h2 class="mb-4"><i class="bi bi-people me-2"></i>Auteurs</h2>

  <!-- Barre de recherche -->
  <div class="mb-4">
    <input
      type="text"
      class="form-control"
      [value]="searchQuery()"
      (input)="searchQuery.set($any($event.target).value)"
      placeholder="Rechercher un auteur par nom ou prénom...">
  </div>

  @if (loading()) {
    <div class="text-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Chargement...</span>
      </div>
    </div>
  } @else {
    @if (filteredAuthors().length === 0) {
      <div class="alert alert-info">Aucun auteur trouvé.</div>
    } @else {
      <div class="row g-4">
        @for (author of filteredAuthors(); track author.id) {
          <div class="col-sm-6 col-md-4 col-lg-3">
            <div class="card h-100 shadow-sm author-card">
              <div class="card-img-top bg-light d-flex align-items-center justify-content-center" style="height: 200px;">
                <i class="bi bi-person display-1 text-muted"></i>
              </div>
              <div class="card-body">
                <h6 class="card-title fw-bold">{{ author.firstName }} {{ author.lastName }}</h6>
                @if (author.nationality) {
                  <p class="text-muted small mb-0">{{ author.nationality }}</p>
                }
              </div>
              <div class="card-footer bg-transparent border-0">
                <a [routerLink]="['/auteurs', author.id]" class="btn btn-outline-primary btn-sm w-100">
                  <i class="bi bi-eye me-1"></i>Voir détails
                </a>
              </div>
            </div>
          </div>
        }
      </div>
    }
  }
</div>

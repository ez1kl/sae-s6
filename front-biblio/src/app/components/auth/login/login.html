<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card login-card">
        <div class="card-body p-4">
          <h3 class="text-center mb-1 login-title">Connexion</h3>
          <p class="text-center mb-4 login-subtitle">Accédez à votre espace adhérent</p>

          @if (error()) {
            <div class="alert alert-danger">
              <i class="bi bi-exclamation-triangle me-2"></i>{{ error() }}
            </div>
          }

          <form (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" id="email" class="form-control" [(ngModel)]="email" name="email"
                       placeholder="votre@email.com" required>
              </div>
            </div>

            <div class="mb-4">
              <label for="password" class="form-label">Mot de passe</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" id="password" class="form-control" [(ngModel)]="password" name="password"
                       placeholder="Votre mot de passe" required>
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100" [disabled]="loading()">
              @if (loading()) {
                <span class="spinner-border spinner-border-sm me-2" role="status"></span>Connexion...
              } @else {
                <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
              }
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
